name: quality-gate

on:
  pull_request:
  push:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refactor Doc Consistency Gate
        shell: pwsh
        run: |
          $report = & powershell -ExecutionPolicy Bypass -File scripts/refactor/check-doc-consistency.ps1 -AsJson
          $report
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Refactor doc consistency check failed."
            exit $LASTEXITCODE
          }

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore (locked mode)
        run: dotnet restore ClassroomToolkit.sln --locked-mode

      - name: Vulnerability Gate
        shell: pwsh
        run: |
          $report = dotnet list ClassroomToolkit.sln package --vulnerable --include-transitive
          $report
          $hasVuln = $report | Select-String -Pattern "has the following vulnerable packages|具有下列易受攻击的包" -SimpleMatch
          if ($hasVuln) {
            Write-Error "Vulnerable NuGet packages detected."
            exit 1
          }

      - name: Build Debug (warnings as errors)
        run: dotnet build ClassroomToolkit.sln -c Debug --no-restore /warnaserror

      - name: Architecture And Interop Contracts
        run: >
          dotnet test tests/ClassroomToolkit.Tests/ClassroomToolkit.Tests.csproj -c Debug --no-build
          --filter "FullyQualifiedName~ArchitectureDependencyTests|FullyQualifiedName~InteropHookLifecycleContractTests|FullyQualifiedName~InteropHookEventDispatchContractTests|FullyQualifiedName~GlobalHookServiceLifecycleContractTests|FullyQualifiedName~CrossPageDisplayLifecycleContractTests"

      - name: Full Debug Tests With Coverage
        run: >
          dotnet test tests/ClassroomToolkit.Tests/ClassroomToolkit.Tests.csproj -c Debug --no-build
          --collect:"XPlat Code Coverage"
          --results-directory artifacts/TestResults/Debug
          --logger "trx;LogFileName=debug.trx"
          --blame-hang --blame-hang-timeout 5m

      - name: Build Release (warnings as errors)
        run: dotnet build ClassroomToolkit.sln -c Release --no-restore /warnaserror

      - name: Full Release Tests
        run: >
          dotnet test tests/ClassroomToolkit.Tests/ClassroomToolkit.Tests.csproj -c Release --no-build
          --results-directory artifacts/TestResults/Release
          --logger "trx;LogFileName=release.trx"
          --blame-hang --blame-hang-timeout 5m

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-test-results
          path: artifacts/TestResults
          if-no-files-found: warn
