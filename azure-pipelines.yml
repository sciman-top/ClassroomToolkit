trigger:
- main

pr:
- main

pool:
  vmImage: 'windows-latest'

steps:
- checkout: self

- pwsh: |
    if (-not (Test-Path "scripts/quality/run-local-quality-gates.ps1")) {
      throw "Missing required script: scripts/quality/run-local-quality-gates.ps1"
    }
    pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/quality/run-local-quality-gates.ps1 -Profile quick
  displayName: Run local quality gates
